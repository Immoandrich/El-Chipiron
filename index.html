<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>El Chipiron 2026</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --surface3: #242424;
    --border: #2a2a2a;
    --border2: #363636;
    --text: #f0f0f0;
    --text2: #c0c0c0;
    --text3: #959595;
    --red: #d12b2b;
    --red-dim: rgba(209,43,43,.12);
    --red-border: rgba(209,43,43,.25);
    --green: #4ade80;
    --amber: #fbbf24;
    --blue: #60a5fa;
    --radius: 14px;
    --radius-sm: 9px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --nav-h: 76px;
    --topbar-h: 56px;
  }
  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    font-weight: 400;
    line-height: 1.5;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #app {
    display: flex; flex-direction: column;
    height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  /* ── TOPBAR ── */
  .topbar {
    height: var(--topbar-h);
    padding: 0 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    z-index: 10;
  }
  .topbar-logo {
    display: flex; align-items: center; gap: 10px;
  }
  .logo-mark {
    width: 30px; height: 30px;
    flex-shrink: 0;
  }
  .topbar-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    letter-spacing: .1em;
    text-transform: uppercase;
    display: none;
  }
  .topbar-title.show { display: block; }
  .search-wrap {
    display: flex; align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 0 12px;
    height: 34px; gap: 6px;
    transition: border-color .2s;
  }
  .search-wrap:focus-within { border-color: var(--border2); }
  .search-icon { color: var(--text3); flex-shrink: 0; }
  .search-input {
    background: none; border: none; outline: none;
    color: var(--text); font-size: 13px;
    font-family: var(--font);
    width: 100px; transition: width .25s;
  }
  .search-input:focus { width: 130px; }
  .search-input::placeholder { color: var(--text3); }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    overflow-y: auto; overflow-x: hidden;
    padding: 16px 20px calc(var(--nav-h) + 16px);
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }
  .content::-webkit-scrollbar { width: 0; }

  /* ── VIEWS ── */
  .view { display: none; animation: fadeIn .18s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    height: var(--nav-h);
    background: rgba(10,10,10,.97);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex; align-items: flex-start;
    padding-top: 10px; z-index: 50;
  }
  .nav-btn {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 5px;
    background: none; border: none;
    color: var(--text3); cursor: pointer;
    padding: 6px 4px;
    transition: color .15s;
    font-family: var(--font);
    position: relative;
  }
  .nav-btn.active { color: var(--text); }
  .nav-btn svg { width: 21px; height: 21px; stroke-width: 1.4; }
  .nav-label { font-size: 10px; font-weight: 500; letter-spacing: .04em; }
  .nav-pip {
    position: absolute; top: 4px;
    width: 3px; height: 3px;
    border-radius: 50%; background: var(--red);
    display: none;
  }
  .nav-btn.active .nav-pip { display: block; }

  /* ── SECTION HEADER ── */
  .sh {
    display: flex; align-items: center;
    justify-content: space-between;
    margin: 22px 0 10px;
  }
  .sh:first-child { margin-top: 4px; }
  .sh-title {
    font-size: 11px; font-weight: 500;
    color: var(--text3);
    letter-spacing: .1em; text-transform: uppercase;
  }
  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 26px; height: 26px;
    border-radius: 7px; cursor: pointer;
    font-size: 17px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; line-height: 1;
  }
  .icon-btn:hover { background: var(--surface3); color: var(--text); }
  .text-btn {
    font-size: 12px; color: var(--text3);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 10px;
    cursor: pointer; font-family: var(--font);
    transition: all .15s;
  }
  .text-btn:hover { color: var(--text); border-color: var(--border2); }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    transition: border-color .15s;
  }
  .card:hover { border-color: var(--border2); }
  .card-title { font-size: 14px; font-weight: 600; color: var(--text); word-break: break-word; line-height: 1.4; }
  .card-title.done { text-decoration: line-through; color: var(--text3); }
  .card-body { font-size: 13px; color: var(--text2); margin-top: 8px; line-height: 1.55; }
  .card-link { font-size: 12px; color: var(--blue); margin-top: 6px; word-break: break-all; cursor: pointer; }

  /* ── TAG ── */
  .tag {
    display: inline-flex; align-items: center;
    font-size: 11px; padding: 3px 9px;
    border-radius: 5px;
    border: 1px solid var(--border2);
    color: var(--text2); font-weight: 500;
  }

  /* ── CHECKBOX ── */
  .chk {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border2);
    border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all .15s;
  }
  .chk.on { background: var(--text); border-color: var(--text); }
  .chk.on::after { content: '✓'; font-size: 12px; color: #000; font-weight: 700; }

  /* ── DELETE BTN ── */
  .del-btn {
    background: none; border: none;
    color: var(--text3); cursor: pointer;
    font-size: 18px; padding: 0 2px;
    line-height: 1; flex-shrink: 0;
    transition: color .15s;
  }
  .del-btn:hover { color: var(--red); }

  /* ── HOME STATS ── */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
  }
  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }
  .stat-val { font-size: 26px; font-weight: 600; font-family: var(--mono); }
  .stat-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }

  /* ── CAT PILLS ── */
  .pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .pill {
    font-size: 12px; padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    color: var(--text2);
    cursor: pointer; background: none;
    font-family: var(--font);
    transition: all .15s; white-space: nowrap;
  }
  .pill.on { background: var(--text); color: #000; border-color: var(--text); font-weight: 500; }

  /* ── THOUGHT INPUT ── */
  .thought-wrap { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .thought-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    color: var(--text); font-size: 14px;
    font-family: var(--font);
    resize: none; min-height: 52px; max-height: 130px;
    outline: none; transition: border-color .15s; line-height: 1.5;
  }
  .thought-textarea:focus { border-color: var(--border2); }
  .thought-textarea::placeholder { color: var(--text3); }
  .thought-row { display: flex; gap: 8px; }
  .thought-select {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    color: var(--text); font-size: 13px;
    font-family: var(--font);
    outline: none; appearance: none; cursor: pointer;
  }
  .thought-add {
    background: var(--red); color: #fff;
    border: none; border-radius: var(--radius-sm);
    padding: 0 20px; font-size: 22px; font-weight: 300;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: opacity .15s;
  }
  .thought-add:hover { opacity: .85; }

  /* ── STREAK ── */
  .streak-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px; margin-bottom: 8px;
  }
  .streak-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .streak-name { font-size: 14px; font-weight: 500; }
  .streak-count {
    font-size: 12px; font-family: var(--mono);
    color: var(--amber);
    background: rgba(251,191,36,.08);
    padding: 2px 9px; border-radius: 5px;
    border: 1px solid rgba(251,191,36,.15);
  }
  .streak-days { display: flex; gap: 5px; }
  .streak-day {
    flex: 1; aspect-ratio: 1;
    border-radius: 7px;
    background: var(--surface2);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; color: var(--text3);
    transition: all .15s; font-weight: 500;
  }
  .streak-day.on { background: rgba(74,222,128,.1); border-color: rgba(74,222,128,.25); color: var(--green); }

  /* ── WISSEN GRID ── */
  .wiki-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .wiki-cat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 14px; cursor: pointer;
    transition: border-color .15s;
  }
  .wiki-cat:hover { border-color: var(--border2); }
  .wiki-cat-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--surface3);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
    color: var(--text2);
  }
  .wiki-cat-icon svg { width: 16px; height: 16px; stroke-width: 1.4; }
  .wiki-cat-name { font-size: 13px; font-weight: 600; }
  .wiki-cat-count { font-size: 11px; color: var(--text3); margin-top: 3px; }

  /* ── MODAL ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.78); z-index: 200;
    align-items: flex-end; justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 1px solid var(--border2);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 24px 20px 36px;
    width: 100%; max-width: 480px;
    max-height: 88vh; overflow-y: auto;
    animation: slideUp .2s ease;
  }
  @keyframes slideUp { from { transform: translateY(28px); opacity: 0; } to { transform: none; opacity: 1; } }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border2);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
  .modal-row { margin-bottom: 14px; }
  .modal-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 7px; }
  .modal-input, .modal-select, .modal-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 10px 13px;
    color: var(--text); font-size: 14px;
    font-family: var(--font); outline: none;
    transition: border-color .15s;
  }
  .modal-input:focus, .modal-select:focus, .modal-textarea:focus { border-color: var(--text3); }
  .modal-input::placeholder, .modal-textarea::placeholder { color: var(--text3); }
  .modal-select { appearance: none; cursor: pointer; }
  .modal-textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-save {
    flex: 1; background: var(--red); color: #fff;
    border: none; border-radius: var(--radius-sm);
    padding: 12px; font-size: 14px; font-weight: 500;
    cursor: pointer; font-family: var(--font);
    transition: opacity .15s;
  }
  .btn-save:hover { opacity: .85; }
  .btn-cancel {
    background: var(--surface2); color: var(--text2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 12px 18px; font-size: 14px;
    cursor: pointer; font-family: var(--font);
  }

  /* ── MISC ── */
  .divider { height: 1px; background: var(--border); margin: 22px 0; }
  .empty { text-align: center; padding: 36px 0; color: var(--text3); font-size: 13px; }
  .back-btn {
    background: none; border: none; color: var(--text2);
    cursor: pointer; padding: 0; margin-right: 10px;
    display: flex; align-items: center;
  }
  mark { background: rgba(209,43,43,.18); color: var(--text); border-radius: 2px; padding: 0 1px; }

  /* ── HOME QUICK ── */
  .home-quick { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .quick-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px; cursor: pointer;
    transition: border-color .15s;
    text-align: left; font-family: var(--font); color: var(--text);
  }
  .quick-card:hover { border-color: var(--border2); }
  .quick-card-icon {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--surface3);
    border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px; color: var(--text2);
  }
  .quick-card-icon svg { width: 15px; height: 15px; stroke-width: 1.4; }
  .quick-card-name { font-size: 13px; font-weight: 700; }
  .quick-card-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }

  /* ── LOGO SVG in App ── */
  .home-logo {
    margin: 4px 0 24px;
  }
  .home-logo svg { height: 38px; width: auto; }


  /* ── ARCHIVE ── */
  .archive-btn {
    background: none; border: none;
    color: var(--text3); cursor: pointer;
    font-size: 12px; padding: 2px 8px;
    border-radius: 5px;
    border: 1px solid var(--border);
    font-family: var(--font);
    transition: all .15s;
    flex-shrink: 0;
    letter-spacing: .03em;
  }
  .archive-btn:hover { color: var(--amber); border-color: var(--amber); }
  .archive-badge {
    font-size: 10px;
    background: rgba(251,191,36,.1);
    color: var(--amber);
    border: 1px solid rgba(251,191,36,.2);
    border-radius: 4px;
    padding: 2px 7px;
    font-weight: 500;
  }
  .archive-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 8px;
    opacity: .65;
  }
  .archive-item-title { font-size: 13px; color: var(--text2); word-break: break-word; }
  .archive-item-meta { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .restore-btn {
    background: none; border: none;
    color: var(--text3); cursor: pointer;
    font-size: 11px; padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    font-family: var(--font);
    transition: all .15s;
  }
  .restore-btn:hover { color: var(--green); border-color: var(--green); }
  .perm-del-btn {
    background: none; border: none;
    color: var(--text3); cursor: pointer;
    font-size: 11px; padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    font-family: var(--font);
    transition: all .15s;
  }
  .perm-del-btn:hover { color: var(--red); border-color: var(--red); }

  /* ── RED ACCENT LINE ── */
  .red-line { width: 24px; height: 2px; background: var(--red); border-radius: 1px; margin-bottom: 16px; }
</style>
</head>

/* ─── Storage ─── */
function load() {
  try {
    const s = localStorage.getItem(SK);
    if (s) D = deepMerge(DEFAULT, JSON.parse(s));
  } catch(e) {}
}
function save() { localStorage.setItem(SK, JSON.stringify(D)); }
function deepMerge(def, saved) {
  const out = JSON.parse(JSON.stringify(def));
  for (const k in saved) {
    if (saved[k] !== null && typeof saved[k] === 'object' && !Array.isArray(saved[k]) && typeof out[k] === 'object' && !Array.isArray(out[k]))
      out[k] = deepMerge(out[k], saved[k]);
    else out[k] = saved[k];
  }
  return out;
}

function showView(v) {
  document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));

  currentView = v; searchActive = false;

  if (si) si.value = '';

    home:'El Chipiron 2026', ziele:'Ziele', gedanken:'Gedanken',
    wissen:'Wissensdatenbank', gewohn:'Gewohnheiten',
    bezieh:'Beziehung', search:'Suche', archiv:'Archiv'
  };
  document.getElementById('view-title').textContent = titles[v] || v;
  const el = document.getElementById('v-' + v);
  if (el) el.classList.add('active');
  const navId = { home:'nav-home', ziele:'nav-ziele', gedanken:'nav-gedanken', wissen:'nav-wissen' };
  if (navId[v]) document.getElementById(navId[v]).classList.add('active');
  render(v);
  document.querySelector('.content').scrollTop = 0;
}

  ({home:renderHome,ziele:renderZiele,gedanken:renderGedanken,wissen:renderWissen,

}

function getDailyQuote() {
  const dayIndex = Math.floor(Date.now() / 86400000);
  return QUOTES[dayIndex % QUOTES.length];
}

  const doneH = allH.filter(g => (g.days||[]).length > 0).length;

  const quote = getDailyQuote();

  el.innerHTML = `
    <div class="home-logo">${logoSVG()}</div>
    <div style="font-size:11px;color:var(--text3);letter-spacing:.09em;text-transform:uppercase;margin-bottom:16px">${day}</div>

/* ═══ GEDANKEN ═══ */
function renderGedanken() {
  const el = document.getElementById('v-gedanken');
  el.innerHTML = `
    <div class="thought-wrap">
      <textarea class="thought-textarea" id="thought-txt" placeholder="Alles raus aus dem Kopf..." rows="2"></textarea>
      <div class="thought-row">
        <select class="thought-select" id="thought-kat">
          ${GEDANKEN_KATS.map(k=>`<option>${k}</option>`).join('')}
        </select>
        <button class="thought-add" onclick="addGedanke()">+</button>
      </div>
    </div>
    <div class="sh"><span class="sh-title">${D.gedanken.length} Gedanken</span></div>
    ${D.gedanken.length
      ? D.gedanken.slice().reverse().map((g,ri) => {
          const i = D.gedanken.length - 1 - ri;
          return `<div class="card">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
              <div class="card-title">${esc(g.text)}</div>
              <button class="archive-btn" onclick="delGedanke(${i})" title="Archivieren">▽</button>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between;margin-top:10px">
              <span class="tag">${esc(g.kat)}</span>
              <span style="font-size:11px;color:var(--text3)">${fmtDate(g.ts)}</span>
            </div>
          </div>`;
        }).join('')
      : '<div class="empty">Noch keine Gedanken — tippe los</div>'
    }`;
}

function addGedanke() {
  const txt = (document.getElementById('thought-txt')?.value || '').trim();
  const kat = document.getElementById('thought-kat')?.value || 'Sonstiges';
  if (!txt) return;
  D.gedanken.push({ id:uid(), text:txt, kat, ts:Date.now() });
  save(); renderGedanken();
}
function delGedanke(i) {
  const g = D.gedanken[i];
  if (g) archivieren({ ...g, _type: 'gedanke' });
  D.gedanken.splice(i, 1);
  save(); renderGedanken();
}

/* ═══ ZIELE ═══ */
function allZiele() {
  return ['Privat','Beziehung','Sport','Business','Redhome',...(D.customZielKats||[])].flatMap(k => (D.ziele[k]||[]).map(z => ({...z,kat:k})));
}
function renderZiele() {
  const el   = document.getElementById('v-ziele');
  const kats = ['Privat','Beziehung','Sport','Business','Redhome',...(D.customZielKats||[])];
  const all  = allZiele();
  let shown = zielFilter === 'Alle' ? all : all.filter(z => z.kat === zielFilter);
  if (zielFilter === 'Redhome' && redhomeSub !== 'Alle') {
    shown = shown.filter(z => z.sub === redhomeSub);
  }
  el.innerHTML = `
    <div class="pills">
      ${['Alle',...kats].map(k=>`<button class="pill ${zielFilter===k?'on':''}" onclick="setZF('${k}')">${k}</button>`).join('')}
      <button class="pill" onclick="addZielKat()">+ Neu</button>
    </div>
    ${zielFilter === 'Redhome' ? `<div class="pills" style="margin-top:-8px">
      ${['Alle','Akquise','Vertrieb','Marketing','Socialmedia'].map(s=>`<button class="pill ${redhomeSub===s?'on':''}" style="font-size:11px;padding:3px 10px" onclick="setRHS('${s}')">${s}</button>`).join('')}
    </div>` : ''}
    <div class="sh">
      <span class="sh-title">${shown.length} Ziele</span>
      <button class="icon-btn" onclick="openZielModal()">+</button>
    </div>
    ${shown.length
      ? shown.map(z=>`
          <div class="card">
            <div style="display:flex;align-items:center;gap:12px">
              <div class="chk ${z.done?'on':''}" onclick="toggleZiel('${z.kat}','${z.id}')"></div>
              <div class="card-title ${z.done?'done':''}" style="flex:1">${esc(z.text)}</div>
              <button class="archive-btn" onclick="delZiel('${z.kat}','${z.id}')" title="Archivieren">▽</button>
            </div>
            <div style="margin-top:10px;margin-left:32px;display:flex;gap:6px">
              <span class="tag">${z.kat}</span>
              ${z.sub ? `<span class="tag" style="color:var(--red);border-color:var(--red-border)">${z.sub}</span>` : ''}
            </div>
          </div>`).join('')
      : '<div class="empty">Noch keine Ziele</div>'
    }`;
}
function setZF(k) { zielFilter=k; redhomeSub='Alle'; renderZiele(); }
function setRHS(s) { redhomeSub=s; renderZiele(); }
function toggleZiel(kat,id) {
  const z=(D.ziele[kat]||[]).find(x=>x.id===id);
  if(z){z.done=!z.done;save();renderZiele();}
}
function delZiel(kat, id) {
  const z = (D.ziele[kat]||[]).find(x => x.id === id);
  if (z) archivieren({ ...z, kat, _type: 'ziel' });
  D.ziele[kat] = (D.ziele[kat]||[]).filter(x => x.id !== id);
  save(); renderZiele();
}
function openZielModal() {
  const kats=['Privat','Beziehung','Sport','Business','Redhome',...(D.customZielKats||[])];
  const preselect = zielFilter !== 'Alle' ? zielFilter : 'Privat';
  const preSub = redhomeSub !== 'Alle' ? redhomeSub : 'Akquise';
  openModal('Neues Ziel / To-do',`
    <div class="modal-row"><div class="modal-label">Titel</div>
      <input class="modal-input" id="mi-text" placeholder="Was möchtest du erreichen?"></div>
    <div class="modal-row"><div class="modal-label">Kategorie</div>
      <select class="modal-select" id="mi-kat" onchange="toggleRHSub(this.value)">
        ${kats.map(k=>`<option ${k===preselect?'selected':''}>${k}</option>`).join('')}
      </select></div>
    <div class="modal-row" id="rh-sub-row" style="${preselect==='Redhome'?'':'display:none'}">
      <div class="modal-label">Unterkategorie</div>
      <select class="modal-select" id="mi-sub">
        ${['Akquise','Vertrieb','Marketing','Socialmedia'].map(s=>`<option ${s===preSub?'selected':''}>${s}</option>`).join('')}
      </select>
    </div>
  `,'ziel');
}
function toggleRHSub(kat) {
  const row = document.getElementById('rh-sub-row');
  if (row) row.style.display = kat === 'Redhome' ? '' : 'none';
}
function addZielKat() {
  const n=prompt('Name der neuen Kategorie:');
  if(!n||!n.trim())return;
  if(!D.customZielKats)D.customZielKats=[];
  D.customZielKats.push(n.trim());
  D.ziele[n.trim()]=[];
  save();renderZiele();
}

/* ═══ GEWOHNHEITEN ═══ */
function renderGewohn() {
  const el=document.getElementById('v-gewohn');
  let html='';
  ['gut','schlecht'].forEach(typ=>{
    const label=typ==='gut'?'Gute Gewohnheiten':'Schlechte Gewohnheiten';
    const arr=D.gewohnheiten[typ]||[];
    html+=`<div class="sh"><span class="sh-title">${label}</span>
      <button class="icon-btn" onclick="openGewohnModal('${typ}')">+</button></div>`;
    if(!arr.length){html+='<div class="empty">Noch keine Einträge</div>';}
    else html+=arr.map(g=>`
      <div class="streak-card">
        <div class="streak-header">
          <span class="streak-name">${esc(g.name)}</span>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="streak-count">▲ ${(g.days||[]).length}</span>
            <button class="del-btn" onclick="delGewohn('${typ}','${g.id}')">×</button>
          </div>
        </div>
        <div class="streak-days">
          ${DAYS.map((d,i)=>`<div class="streak-day ${(g.days||[]).includes(i)?'on':''}" onclick="toggleDay('${typ}','${g.id}',${i})">${d}</div>`).join('')}
        </div>
      </div>`).join('');
  });
  el.innerHTML=html;
}
function toggleDay(typ,id,di) {
  const g=(D.gewohnheiten[typ]||[]).find(x=>x.id===id);
  if(!g)return;
  if(!g.days)g.days=[];
  g.days=g.days.includes(di)?g.days.filter(x=>x!==di):[...g.days,di];
  save();renderGewohn();
}
function openGewohnModal(typ) {
  openModal(`Neue ${typ==='gut'?'gute':'schlechte'} Gewohnheit`,`
    <div class="modal-row"><div class="modal-label">Bezeichnung</div>
      <input class="modal-input" id="mi-text" placeholder="${typ==='gut'?'z.B. Lesen, Sport, Meditation...':'z.B. Social Media, Snoozen...'}"></div>
  `,'gewohn-'+typ);
}
function delGewohn(typ, id) {
  const g = (D.gewohnheiten[typ]||[]).find(x => x.id === id);
  if (g) archivieren({ ...g, _type: 'gewohnheit', _subtyp: typ });
  D.gewohnheiten[typ] = (D.gewohnheiten[typ]||[]).filter(x => x.id !== id);
  save(); renderGewohn();
}

/* ═══ WISSEN ═══ */
function renderWissen() {
  const el=document.getElementById('v-wissen');
  if(wissenKat){renderWissenDetail(el);return;}
  const kats=[...WISSEN_KATS,...(D.customWissenKats||[])];
  el.innerHTML=`
    <div class="sh" style="margin-top:4px"><span class="sh-title">Kategorien</span>
      <button class="text-btn" onclick="addWissenKat()">+ Kategorie</button>
    </div>
    <div class="wiki-grid">
      ${kats.map(k=>{
        const cnt=(D.wissen[k]||[]).length;
        const icon=WISSEN_SVG[k]||WISSEN_SVG.default;
        return `<div class="wiki-cat" onclick="wissenKat='${k}';renderWissen()">
          <div class="wiki-cat-icon">${icon}</div>
          <div class="wiki-cat-name">${k}</div>
          <div class="wiki-cat-count">${cnt} Einträge</div>
        </div>`;
      }).join('')}
    </div>`;
}
function renderWissenDetail(el) {
  const items=D.wissen[wissenKat]||[];
  el.innerHTML=`
    <div style="display:flex;align-items:center;margin-bottom:16px">
      <button class="back-btn" onclick="wissenKat=null;renderWissen()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div style="font-size:17px;font-weight:500">${wissenKat}</div>
    </div>
    <div class="sh"><span class="sh-title">${items.length} Einträge</span>
      <button class="icon-btn" onclick="openWissenModal()">+</button>
    </div>
    ${items.length
      ? items.slice().reverse().map((w,ri)=>{
          const i=items.length-1-ri;
          return `<div class="card">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
              <div class="card-title">${esc(w.title)}</div>
              <button class="del-btn" onclick="delWissen(${i})">×</button>
            </div>
            ${w.note?`<div class="card-body">${esc(w.note)}</div>`:''}
            ${w.link?`<div class="card-link" onclick="window.open('${w.link}','_blank')">↗ ${esc(w.link)}</div>`:''}
            <div style="margin-top:8px"><span style="font-size:11px;color:var(--text3)">${fmtDate(w.ts)}</span></div>
          </div>`;
        }).join('')
      : '<div class="empty">Noch keine Einträge</div>'
    }`;
}
function openWissenModal() {
  openModal(`Eintrag: ${wissenKat}`,`
    <div class="modal-row"><div class="modal-label">Titel</div>
      <input class="modal-input" id="mi-text" placeholder="Stichwort oder Titel"></div>
    <div class="modal-row"><div class="modal-label">Notiz</div>
      <textarea class="modal-textarea" id="mi-note" placeholder="Deine Notiz..."></textarea></div>
    <div class="modal-row"><div class="modal-label">Link (optional)</div>
      <input class="modal-input" id="mi-link" placeholder="https://..."></div>
  `,'wissen');
}
function delWissen(i) {
  const w = (D.wissen[wissenKat]||[])[i];
  if (w) archivieren({ ...w, _type: 'wissen', _kat: wissenKat });
  (D.wissen[wissenKat]||[]).splice(i, 1);
  save(); renderWissen();
}
function addWissenKat() {
  const n=prompt('Kategorie-Name:');
  if(!n||!n.trim())return;
  if(!D.customWissenKats)D.customWissenKats=[];
  D.customWissenKats.push(n.trim());
  D.wissen[n.trim()]=[];
  save();renderWissen();
}

/* ═══ BEZIEHUNG ═══ */
function renderBezieh() {
  const el=document.getElementById('v-bezieh');
  const section=(typ,label,ph)=>{
    const items=D.beziehung[typ]||[];
    return `
      <div class="sh"><span class="sh-title">${label}</span>
        <button class="icon-btn" onclick="openBeziehModal('${typ}','${ph}')">+</button>
      </div>
      ${items.length
        ? items.slice().reverse().map((item,ri)=>{
            const i=items.length-1-ri;
            return `<div class="card">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
                <div class="card-title">${esc(item.text)}</div>
                <button class="del-btn" onclick="delBezieh('${typ}',${i})">×</button>
              </div>
              ${item.note?`<div class="card-body">${esc(item.note)}</div>`:''}
              <div style="margin-top:8px"><span style="font-size:11px;color:var(--text3)">${fmtDate(item.ts)}</span></div>
            </div>`;
          }).join('')
        : '<div class="empty">Noch keine Einträge</div>'
      }`;
  };
  el.innerHTML=
    section('unternehmungen','Unternehmungen','Was wollt ihr erleben?')+
    '<div class="divider"></div>'+
    section('visionen','Visionen & Wünsche','Ein gemeinsamer Traum...');
}
function openBeziehModal(typ,ph) {
  openModal(typ==='unternehmungen'?'Neue Unternehmung':'Vision / Wunsch',`
    <div class="modal-row"><div class="modal-label">Titel</div>
      <input class="modal-input" id="mi-text" placeholder="${ph}"></div>
    <div class="modal-row"><div class="modal-label">Notiz</div>
      <textarea class="modal-textarea" id="mi-note" placeholder="Details..."></textarea></div>
  `,'bezieh-'+typ);
}
function delBezieh(typ, i) {
  const item = (D.beziehung[typ]||[])[i];
  if (item) archivieren({ ...item, _type: 'bezieh', _subtyp: typ });
  (D.beziehung[typ]||[]).splice(i, 1);
  save(); renderBezieh();
}

/* ═══ MODAL ENGINE ═══ */
function openModal(title,body,type) {
  currentModal=type;
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>{const f=document.getElementById('mi-text');if(f)f.focus();},120);
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open');currentModal=null; }

function saveModal() {
  if(!currentModal)return;
  const text=(document.getElementById('mi-text')?.value||'').trim();
  if(!text){closeModal();return;}

  if(currentModal==='ziel'){
    const kat=document.getElementById('mi-kat').value;
    const sub=kat==='Redhome'?(document.getElementById('mi-sub')?.value||'Akquise'):null;
    if(!D.ziele[kat])D.ziele[kat]=[];
    D.ziele[kat].push({id:uid(),text,done:false,sub,ts:Date.now()});
    save();closeModal();renderZiele();

  } else if(currentModal.startsWith('gewohn-')){
    const typ=currentModal.split('-')[1];
    if(!D.gewohnheiten[typ])D.gewohnheiten[typ]=[];
    D.gewohnheiten[typ].push({id:uid(),name:text,days:[],ts:Date.now()});
    save();closeModal();renderGewohn();

  } else if(currentModal==='wissen'){
    const note=(document.getElementById('mi-note')?.value||'').trim();
    const link=(document.getElementById('mi-link')?.value||'').trim();
    if(!D.wissen[wissenKat])D.wissen[wissenKat]=[];
    D.wissen[wissenKat].push({id:uid(),title:text,note,link,ts:Date.now()});
    save();closeModal();renderWissen();

  } else if(currentModal.startsWith('bezieh-')){
    const typ=currentModal.replace('bezieh-','');
    const note=(document.getElementById('mi-note')?.value||'').trim();
    if(!D.beziehung[typ])D.beziehung[typ]=[];
    D.beziehung[typ].push({id:uid(),text,note,ts:Date.now()});
    save();closeModal();renderBezieh();
  }
}

/* ═══ MORE ═══ */
function openMore() { document.getElementById('more-overlay').classList.add('open'); }
function closeMore() { document.getElementById('more-overlay').classList.remove('open'); }
function overlayClose(e,id) {
  if(e.target===document.getElementById(id)){
    document.getElementById(id).classList.remove('open');
    if(id==='modal-overlay')currentModal=null;
  }
}


/* ═══ ARCHIV ═══ */
function archivieren(item) {
  if (!D.archiv) D.archiv = [];
  D.archiv.unshift({ ...item, archivedAt: Date.now() });
  save();
}

function renderArchiv() {
  const el = document.getElementById('v-archiv');
  const items = D.archiv || [];
  const typeLabel = { gedanke:'Gedanke', ziel:'Ziel', wissen:'Wissen', gewohnheit:'Gewohnheit', bezieh:'Beziehung' };
  el.innerHTML = `
    <div class="sh" style="margin-top:4px">
      <span class="sh-title">${items.length} Archiviert</span>
      ${items.length ? `<button class="text-btn" onclick="clearArchiv()" style="color:var(--red);border-color:var(--red-border)">Alles löschen</button>` : ''}
    </div>
    ${items.length
      ? items.map((item, i) => `
          <div class="archive-item">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
              <div>
                <div class="archive-item-title">${esc(item.text || item.title || item.name || '')}</div>
                ${item.note ? `<div style="font-size:12px;color:var(--text3);margin-top:4px">${esc(item.note)}</div>` : ''}
                <div class="archive-item-meta">
                  <span class="archive-badge">${typeLabel[item._type] || item._type}</span>
                  ${item.kat || item._kat ? `<span style="margin-left:6px">${esc(item.kat || item._kat)}</span>` : ''}
                  <span style="margin-left:6px">${fmtDate(item.archivedAt)}</span>
                </div>
              </div>
            </div>
            <div style="display:flex;gap:8px;margin-top:10px">
              <button class="restore-btn" onclick="restoreArchiv(${i})">↩ Wiederherstellen</button>
              <button class="perm-del-btn" onclick="permDeleteArchiv(${i})">× Löschen</button>
            </div>
          </div>`).join('')
      : '<div class="empty">Archiv ist leer</div>'
    }`;
}

function restoreArchiv(i) {
  const item = D.archiv[i];
  if (!item) return;
  const typ = item._type;
  if (typ === 'gedanke') {
    D.gedanken.push({ id: uid(), text: item.text, kat: item.kat, ts: Date.now() });
  } else if (typ === 'ziel') {
    const kat = item.kat || 'Privat';
    if (!D.ziele[kat]) D.ziele[kat] = [];
    D.ziele[kat].push({ id: uid(), text: item.text, done: false, ts: Date.now() });
  } else if (typ === 'wissen') {
    const kat = item._kat;
    if (!D.wissen[kat]) D.wissen[kat] = [];
    D.wissen[kat].push({ id: uid(), title: item.title, note: item.note, link: item.link, ts: Date.now() });
  } else if (typ === 'gewohnheit') {
    const subtyp = item._subtyp || 'gut';
    if (!D.gewohnheiten[subtyp]) D.gewohnheiten[subtyp] = [];
    D.gewohnheiten[subtyp].push({ id: uid(), name: item.name, days: [], ts: Date.now() });
  } else if (typ === 'bezieh') {
    const subtyp = item._subtyp || 'unternehmungen';
    if (!D.beziehung[subtyp]) D.beziehung[subtyp] = [];
    D.beziehung[subtyp].push({ id: uid(), text: item.text, note: item.note, ts: Date.now() });
  }
  D.archiv.splice(i, 1);
  save(); renderArchiv();
}

function permDeleteArchiv(i) {
  D.archiv.splice(i, 1);
  save(); renderArchiv();
}

function clearArchiv() {
  if (!confirm('Archiv wirklich komplett leeren?')) return;
  D.archiv = [];
  save(); renderArchiv();
}

/* ═══ SEARCH ═══ */
function handleSearch(q) {
  q=q.trim();
  if(!q){if(searchActive){searchActive=false;showView(currentView==='search'?'home':currentView);}return;}
  searchActive=true;
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.getElementById('v-search').classList.add('active');
  document.getElementById('view-title').textContent='Suche';
  const ql=q.toLowerCase();
  const res=[];
  D.gedanken.forEach(g=>{if(g.text.toLowerCase().includes(ql))res.push({type:'Gedanke',title:g.text,sub:g.kat});});
  Object.entries(D.ziele).forEach(([kat,arr])=>arr.forEach(z=>{if(z.text.toLowerCase().includes(ql))res.push({type:'Ziel',title:z.text,sub:kat});}));
  Object.entries(D.wissen).forEach(([kat,arr])=>arr.forEach(w=>{if((w.title+' '+w.note).toLowerCase().includes(ql))res.push({type:'Wissen',title:w.title,sub:kat});}));
  const el=document.getElementById('v-search');
  el.innerHTML=res.length
    ? `<div class="sh"><span class="sh-title">${res.length} Ergebnisse</span></div>`+
      res.map(r=>`<div class="card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span class="tag">${r.type}</span>
          <span style="font-size:11px;color:var(--text3)">${r.sub}</span>
        </div>
        <div class="card-title">${highlight(esc(r.title),q)}</div>
      </div>`).join('')
    : '<div class="empty">Keine Ergebnisse für "'+esc(q)+'"</div>';
}
function highlight(t,q) {
  return t.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>');
}

/* ─── Utils ─── */
function uid() { return Math.random().toString(36).slice(2,10); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(ts) { return new Date(ts).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'}); }

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeMore();}
  if(e.key==='Enter'&&document.activeElement?.id==='thought-txt'){e.preventDefault();addGedanke();}
});

renderHome();
</script>
</body>
</html>
